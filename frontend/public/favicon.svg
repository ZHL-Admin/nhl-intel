<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <style>
    .mark { fill: none; stroke: #1a1a1a; }
    .dot { fill: #1a1a1a; stroke: none; }
    @media (prefers-color-scheme: dark) {
      .mark { stroke: #f5f5f5; }
      .dot { fill: #f5f5f5; }
    }
  </style>
  <circle class="mark" cx="16" cy="16" r="12" stroke-width="2.5" />
  <circle class="dot" cx="16" cy="16" r="4.5" />
</svg>
