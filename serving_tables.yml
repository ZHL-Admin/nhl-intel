  # --- NEW precomputed serving tables (built by models_ml/precompute_serving.py) ---
  # built:false flips to true once the precompute job has run + written the table.
  - {name: dim_current_roster,     dataset: models, kind: precompute, cap: full, built: true, indexes: [player_id, name_lower]}
  - {name: line_member_features,   dataset: models, kind: precompute, cap: full, built: true, indexes: [[player_id, season]]}
