  - {name: mart_goalie_season,         dataset: mart, kind: source, cap: full, indexes: [goalie_id, season]}
  - {name: mart_team_identity,         dataset: mart, kind: source, cap: full, indexes: [team_id, season]}
  - {name: mart_team_rolling,          dataset: mart, kind: source, cap: full, indexes: [team_id, season]}
  - {name: mart_team_zone_time,        dataset: mart, kind: source, cap: full, indexes: [team_id, season]}
  - {name: mart_team_faceoffs,         dataset: mart, kind: source, cap: full, indexes: [team_id, season]}
  - {name: mart_team_stats_situational,dataset: mart, kind: source, cap: full, indexes: [team_id, game_id]}
  - {name: mart_player_zone_deployment,dataset: mart, kind: source, cap: full, indexes: [player_id, team_id, season]}
  - {name: mart_player_situational,    dataset: mart, kind: source, cap: full, indexes: [player_id, season]}
  - {name: mart_player_shooting_luck,  dataset: mart, kind: source, cap: full, indexes: [player_id, season]}
  - {name: mart_player_relative,       dataset: mart, kind: source, cap: full, indexes: [player_id, season]}
  - {name: mart_player_game_score,     dataset: mart, kind: source, cap: full, indexes: [player_id, season]}
  - {name: mart_edge_player_profile,   dataset: mart, kind: source, cap: full, indexes: [player_id]}
  - {name: mart_edge_team_profile,     dataset: mart, kind: source, cap: full, indexes: [team_id]}
  # --- Trade tool: contract layer + unified tradeable-asset layer ---------------
