# serving_tables.yml
#
# Single source of truth for the DuckDB SERVING layer.
#
# Architecture: BigQuery stays the nightly COMPUTE engine + system of record. Everything
# the SITE READS at request time is materialized into ONE local DuckDB file each night
# (scripts/export_to_duckdb.py); the FastAPI backend reads only from DuckDB (ms latency,
# no BigQuery client on the request path). DuckDB is a rebuildable, read-only serving copy
# — if lost, `make export-serving` regenerates it from BigQuery. Nothing lives only here.
#
# This file is BOTH the human inventory (Part 1 deliverable) and the machine-readable
# config the export script consumes (the `tables:` list). One config, no drift.
#
# kind:
#   source   -> copy the BigQuery table/view AS-IS into DuckDB; the backend keeps the same
#               query SHAPE (filters/aggregations/windows) but runs it in DuckDB.
#   precompute-> the endpoint RESULT, materialized nightly by a models_ml/dbt job into a BQ
#               table that then rides this same export (built: true once the job ships).
# cap:
#   full     -> all rows / all seasons.
#   recent   -> only the most recent `meta.recent_seasons` seasons, filtered by the game_id
#               season prefix (CAST(SUBSTR(CAST(game_id AS STRING),1,4) AS INT64) >= start_year).
#               Used for big per-event/per-game tables that the site only shows for recent games.

meta:
  duckdb_path: data/serving/nhl_intel.duckdb
  recent_seasons: 3                 # current + prior 2 (capped per-event tables)
  staging_dataset: nhl_staging
  mart_dataset: nhl_mart
  models_dataset: nhl_models

# =============================================================================
# Tables exported into DuckDB (the machine-readable manifest the export reads)
# =============================================================================
tables:

  # --- staging VIEWS read at request time (the slow ones today) ----------------
  - {name: stg_games,           dataset: staging, kind: source, cap: full,   indexes: [game_id, game_date, season]}
  - {name: stg_boxscores,       dataset: staging, kind: source, cap: full,   indexes: [game_id, season]}
  - {name: stg_rosters,         dataset: staging, kind: source, cap: full,   indexes: [player_id, game_id, [team_id, season]]}
  - {name: stg_play_by_play,    dataset: staging, kind: source, cap: recent, indexes: [game_id]}
  - {name: stg_game_context,    dataset: staging, kind: source, cap: full,   indexes: [game_id]}
  - {name: stg_standings,       dataset: staging, kind: source, cap: full,   indexes: [team_abbrev, standings_date]}
  - {name: stg_player_bio,      dataset: staging, kind: source, cap: full,   indexes: [player_id]}
  - {name: int_shot_types,      dataset: staging, kind: source, cap: recent, indexes: [game_id, shooting_player_id]}
  - {name: int_shot_attempts_all, dataset: staging, kind: source, cap: recent, indexes: [game_id]}
  - {name: int_line_seasons,    dataset: staging, kind: source, cap: full,   indexes: [[season, line_key]]}
  # int_shot_sequence / int_shift_segments / int_segment_context: NOT exported — only the
  # model-scoring paths read them, and those become precompute (line_member_features etc).

  # --- marts (already BASE TABLEs) --------------------------------------------
