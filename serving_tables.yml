  - {name: goalie_overall,     dataset: models, kind: source, cap: full, indexes: [goalie_id, season_window]}
  - {name: player_impact,      dataset: models, kind: source, cap: full, indexes: [player_id, season_window]}
  - {name: player_assessment,  dataset: models, kind: source, cap: full, indexes: [player_id, season_window]}
  - {name: player_prior_quality, dataset: models, kind: source, cap: full, indexes: [player_id, season]}
  - {name: player_clutch,      dataset: models, kind: source, cap: full, indexes: [player_id, season_window]}
  - {name: player_consistency, dataset: models, kind: source, cap: full, indexes: [player_id, season_window]}
  - {name: player_verdict,     dataset: models, kind: source, cap: full, indexes: [player_id, season]}
  - {name: player_coach_trust, dataset: models, kind: source, cap: full, indexes: [player_id, season_window]}
  - {name: divergence_board,   dataset: models, kind: source, cap: full, indexes: [player_id, season_window]}
  - {name: deployment_efficiency, dataset: models, kind: source, cap: full, indexes: [player_id, situation]}
  - {name: aging_curves,       dataset: models, kind: source, cap: full, indexes: [archetype]}
  - {name: player_twins,       dataset: models, kind: source, cap: full, indexes: [player_id]}
