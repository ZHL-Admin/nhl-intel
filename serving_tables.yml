  - {name: mart_player_wowy,           dataset: mart, kind: source, cap: full, indexes: [player_id, season]}
  - {name: mart_player_toi_matrix,     dataset: mart, kind: source, cap: full, indexes: [team_id, season]}
  - {name: mart_player_entanglement,   dataset: mart, kind: source, cap: full, indexes: [player_id, season]}
  - {name: mart_player_carry,          dataset: mart, kind: source, cap: full, indexes: [player_id, season]}
  - {name: mart_player_impact_context, dataset: mart, kind: source, cap: full, indexes: [player_id, season]}
  - {name: mart_player_quality_context, dataset: mart, kind: source, cap: full, indexes: [player_id, season, team_id]}

