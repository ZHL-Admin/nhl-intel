  # best_team_fits is NOT precomputed: it runs live on DuckDB (cheap once inputs are local) + cached.

# =============================================================================
# Open DECISIONS resolved with the user (2026-06-18)
# =============================================================================
decisions_resolved:
  season_scope: "cap big per-event tables (stg_play_by_play, int_shot_types, int_shot_attempts_all, shot_xg, win_probability) to recent 3 seasons; everything else full."
  line_fit: "precompute line_member_features; live line-fit reads features from DuckDB + cached LightGBM artifact (no BigQuery, no segment export)."
  trade_fit: "precompute best_team_fits (top-N per player) fully; specific player-vs-team is a cached live DuckDB compute, not a precomputed grid."
  git: "ArchetypeExplorer work is the user's; safe to commit together."

# =============================================================================
# Endpoint -> serving strategy notes (the Part 1 inventory, condensed)
# =============================================================================
# Roster-trick endpoints (search, /players/leaders, /players/archetypes/{a}, divergence &
#   deployment boards, archetype style-map, /rankings/value, score_line names) currently do
#   ARRAY_AGG(team_id ORDER BY game_id DESC LIMIT 1)[OFFSET(0)] over stg_rosters on every
#   call -> repoint to nhl_models.dim_current_roster (name+team+abbrev+archetype joined).
# Model-scoring endpoints (POST /tools/trade-fit, GET /tools/trade-fit/best-teams,
#   GET /teams/{id}/lines, GET /games/{id}/preview) -> precomputed tables / cached live.
# POST /tools/line-fit, /line-fit/suggestions -> live model over line_member_features (DuckDB).
# GET /games/{id}/skater-impact -> mart_game_skater_box (replaces raw_boxscores UNNEST).
# Everything else -> same query shape, run in DuckDB against the exported source tables.
