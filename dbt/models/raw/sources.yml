version: 2

sources:
  - name: nhl_models
    database: nhl-intel-498216
    schema: nhl_models
    description: >
      Outputs of the Python model layer (models_ml/). Written by training/scoring jobs,
      consumed by dbt marts. See docs/methodology/ for each model.
    tables:
      - name: shot_xg
        description: >
          In-house xG per unblocked, non-empty-net, non-shootout shot with additive
          decomposition (Phase 2.2; models_ml/score_xg.py). One row per (game_id,
          event_id). Empty-net shots are absent by design, so xG totals exclude them.
        columns:
          - name: game_id
            description: Unique NHL game identifier
          - name: event_id
            description: Shot event id (joins stg_play_by_play / int_shot_sequence)
          - name: xg
            description: Model probability the shot is a goal
          - name: base_rate
            description: Model base value (league shot goal rate) in probability space
          - name: model_version
            description: xG model artifact version (e.g. xg_v1)

      - name: win_probability
        description: >
          Server-side win probability + leverage per (game_id, elapsed_seconds) on a 10s grid
          (Phase 2.4; models_ml/score_winprob.py). leverage = WP swing of a goal at that state.

      - name: team_ratings
        description: >
          Power ratings (Phase 3.1; models_ml/compute_ratings.py). One row per
          (team, game_date) carrying the season-to-date rating through that game.
          pregame_strength_share is the leak-free pregame opponent-adjusted 5v5 xGF
          share consumed by mart_team_game_stats opponent adjustment when
          var('rating_source')='power_rating'.
        columns:
          - name: game_id
            description: Game whose pregame state this rating row precedes
          - name: team_id
            description: NHL team id
          - name: pregame_strength_share
            description: Pregame opponent-adjusted, score-adjusted 5v5 xGF share [0,1]
          - name: total_rating
            description: Season-to-date total rating through this game (goals/game)

      - name: deserved_standings
        description: >
          Monte-Carlo deserved points (Phase 3.1; models_ml/simulate_deserved.py),
          one row per (season, team_id).

      - name: style_map
        description: >
          League style map (Phase 3.2; models_ml/compute_style_map.py): 2D PCA of team
          identity fingerprints, one row per (season, team_id) with x/y coordinates and
          the four axis description strings (repeated per row).

      - name: streak_cards
        description: >
          Streak Doctor cards (Phase 3.3; models_ml/streak_doctor.py): one row per
          (season, team_id, window_games) decomposing the last-N run into goal-scale
          components with a verdict, sustainability meter, and is_notable flag.

      - name: player_impact
        description: >
          Isolated-impact RAPM (Phase 4.1; models_ml/train_rapm.py): one row per
          (player_id, season_window) with off/def/pp/pk impact (xGF/60 units, higher =
          better) and bootstrap SDs, for single seasons and a 3-season weighted window.

      - name: player_composite
        description: >
          Composite stack (Phase 4.2; models_ml/compute_composite.py): per
          (player_id, season_window), value components on a goals scale (EV off/def, PP,
          PK, finishing, penalty diff, goalie GSAx) + total + uncertainty.

      - name: player_archetypes
        description: >
          Player archetypes (Phase 4.2; models_ml/fit_archetypes.py): per (player_id,
          season) soft archetype memberships from per-position Gaussian mixtures. Names are
          hand-assigned (config.ARCHETYPE_NAMES) from the labeling report.

      - name: roster_forecast
        description: >
          Offseason roster forecast (models_ml/project_roster_forecast.py): one row per
          (team_id, transition) projecting next-season team rating from the moves made, with an
          honest band (band_low/band_high), projected league rank, the net lineup-WAR delta, a
          chemistry adjustment, and the four base rating components. READS team_ratings + value
          tables; trains nothing.
        columns:
          - name: team_id
            description: NHL team id
            tests: [not_null]
          - name: transition
            description: prior_completed_season->next_season, e.g. 2024-25->2025-26
            tests: [not_null]
          - name: projected_rating
            description: Projected next-season rating (goals/game, same scale as team_ratings)
          - name: band_low
            description: Low end of the honest band (goals/game)
          - name: band_high
            description: High end of the honest band (goals/game)
          - name: projected_rank
            description: Projected league rank (1 = best by projected_rating)

      - name: roster_moves
        description: >
          Long move ledger behind each roster_forecast (one row per team_id, transition, player_id):
          move_type (arrival/departure/returning), base_war, projected_war (aged + reliability-shrunk),
          war_sd band, no_track_record flag, and the lineup slot it fills/vacates. The per-player
          delta_contribution partitions the team's net lineup-WAR delta (the consistency discipline).
        columns:
          - name: team_id
            description: NHL team id
            tests: [not_null]
          - name: transition
            description: prior_completed_season->next_season
            tests: [not_null]
          - name: move_type
            description: arrival | departure | returning | replacement_fill
          - name: delta_contribution
            description: This row's signed contribution to the team's net projected-WAR delta

      - name: player_contract_value
        description: >
          Contract surplus (Trade tool P4; models_ml/compute_contract_value.py): one row per matched
          player on the latest snapshot with projected on-ice value (WAR + market dollars), cap cost,
          present-valued surplus, a confidence band, and a grounded/proxy tag.
        columns:
          - name: player_id
            description: Canonical NHL player id
          - name: total_discounted_surplus
            description: Present value of (market AAV - cap hit) over the remaining years
          - name: confidence
            description: high / medium / proxy

      - name: futures_value
        description: >
          Prospect + draft-pick value (Trade tool P6; models_ml/compute_futures_value.py): one row
          per prospect and per pick in the same WAR + dollar currency as contracts. Explicit proxies
          with wide bands. asset_kind discriminates prospect vs pick.
        columns:
          - name: asset_id
            description: Stable asset key (prospect:<id> or pick:<team>:<year>:R<round>)
          - name: asset_kind
            description: prospect | pick
          - name: player_id
            description: Player id for a prospect (null for a pick)

      - name: contract_player_map
        description: >
          Contract -> canonical player_id resolution (Trade tool P2;
          scripts/match_contracts.py). One row per matched (player_name_src, team, season,
          as_of_date) with the player_id, match_method, and confidence. Conservative: only
          rows resolvable to exactly one player are present; prospects/ambiguous land in the
          unmatched report, not here. Surname-tier matches carry confidence='medium'.
        columns:
          - name: player_name_src
            description: Source contract name ("Last, First"), the join key back to raw_contracts
          - name: player_id
            description: Canonical NHL player id used across the marts
          - name: match_method
            description: How the row matched (name+team+pos, lastname+initial+team+age, override, ...)
          - name: confidence
            description: high (direct name match / override) or medium (surname-tier)

      - name: rfa_player_map
        description: >
          Pending-RFA -> canonical player_id resolution (scripts/match_rfas.py). The RFA feed has
          no team, so this is a TEAM-LESS match (unique name / name+pos / name+age). One row per
          matched (player_name_src, season, as_of_date). Minor-league RFAs with no NHL game are
          absent (correctly, like prospects).
        columns:
          - name: player_name_src
            description: Source RFA name ("Last, First"), the join key back to raw_contracts_rfa
          - name: player_id
            description: Canonical NHL player id used across the marts
          - name: confidence
            description: high (unique name / name+pos / override) or medium (surname-tier)

  - name: nhl
    database: nhl-intel-498216
    schema: nhl_raw
    tables:
      - name: raw_games
        description: Raw schedule data from NHL API, one row per schedule fetch
        columns:
          - name: ingestion_date
            description: Date when data was ingested into BigQuery
          - name: gameWeek
            description: Nested array of game data for the week

      - name: raw_boxscores
        description: Raw boxscore data from NHL API, one row per game
        columns:
          - name: game_id
            description: Unique NHL game identifier
          - name: ingestion_date
            description: Date when data was ingested into BigQuery
          - name: id
            description: Game ID from API response
          - name: season
            description: NHL season identifier
          - name: gameType
            description: Game type code (2=regular season, 3=playoffs)
          - name: gameDate
            description: Date the game was played
          - name: homeTeam
            description: Nested home team data including stats
          - name: awayTeam
            description: Nested away team data including stats

      - name: raw_play_by_play
        description: Raw play-by-play event data from NHL API, one row per game
        columns:
          - name: game_id
            description: Unique NHL game identifier
          - name: ingestion_date
            description: Date when data was ingested into BigQuery
          - name: id
            description: Game ID from API response
          - name: plays
            description: Array of all events in the game
          - name: rosterSpots
            description: Array of all players who dressed for the game

      - name: raw_shift_charts
        description: >
          Raw shift-chart data from api.nhle.com/stats/rest/en/shiftcharts, one row
          per game. The shift array is stored as a serialized JSON string in `data`.
        columns:
          - name: game_id
            description: Unique NHL game identifier
          - name: ingestion_date
            description: Date when data was ingested into BigQuery
          - name: season
            description: NHL season identifier
          - name: data
            description: >
              Serialized JSON array of shift rows. typeCode 517 = real shifts;
              typeCode 505 = goal annotations (null duration, excluded downstream).

      - name: raw_edge_skaters
        description: >
          NHL Edge skater season aggregates, one row per (entity_id, season_id,
          game_type, report). The per-report payload is serialized in `data`.
        columns:
          - name: entity_id
            description: Player id
          - name: season_id
            description: Season as YYYYYYYY
          - name: game_type
            description: 2 = regular season, 3 = playoffs
          - name: report
            description: Edge report (e.g. skating-speed-detail, zone-time)
          - name: data
            description: Serialized JSON Edge payload for the report

      - name: raw_edge_goalies
        description: NHL Edge goalie season aggregates (see raw_edge_skaters for shape).
        columns:
          - name: entity_id
          - name: season_id
          - name: game_type
          - name: report
          - name: data

      - name: raw_edge_teams
        description: NHL Edge team season aggregates (see raw_edge_skaters for shape).
        columns:
          - name: entity_id
          - name: season_id
          - name: game_type
          - name: report
          - name: data

      - name: raw_statsrest_faceoffs
        description: >
          Season-level per-player faceoff splits from the stats-REST
          skater/faceoffwins report. One row per (playerId, seasonId, gameType)
          per ingestion. Flat records (zone + ev/pp/sh win/loss counts).
        columns:
          - name: playerId
            description: NHL player id
          - name: seasonId
            description: Season as YYYYYYYY (integer)
          - name: ingestion_date
            description: Date when data was ingested into BigQuery

      - name: raw_game_landing
        description: >
          Raw gamecenter landing payload, one row per game. Heavy nested objects
          (summary, awayTeam, homeTeam, ...) are serialized JSON strings; parsed by
          stg_game_context for goal highlight links and three stars.
        columns:
          - name: game_id
            description: Unique NHL game identifier
          - name: summary
            description: Serialized JSON; summary.scoring[].goals[] carry highlight links
          - name: ingestion_date

      - name: raw_game_right_rail
        description: >
          Raw gamecenter right-rail payload, one row per game. Nested objects
          (gameInfo, seasonSeries, teamGameStats, ...) serialized as JSON strings;
          parsed by stg_game_context for scratches, season series, and stat comparisons.
        columns:
          - name: game_id
            description: Unique NHL game identifier (injected by the loader)
          - name: gameInfo
            description: Serialized JSON; carries per-team scratches and coaches
          - name: ingestion_date

      - name: raw_partner_odds
        description: >
          Partner sportsbook odds snapshots (api-web partner-game/{cc}/now). One row
          per snapshot; games + bettingPartner serialized. INTERNAL CALIBRATION ONLY
          (blueprint 13.2): never exposed via API/UI.
        columns:
          - name: games
            description: Serialized JSON array of per-game odds
          - name: ingestion_date

      - name: raw_glossary
        description: >
          NHL stats-REST glossary term definitions (api.nhle.com/stats/rest/en/glossary).
          Ingested once for Phase 6 concept cards. Flat records (id, abbreviation, definition).
        columns:
          - name: id
          - name: abbreviation
          - name: definition
          - name: ingestion_date

      - name: raw_standings
        description: >
          League standings as of a date (api-web standings/{date}), one row per team
          per date. Localized name objects (teamName, teamAbbrev, ...) serialized as
          JSON strings; parsed by stg_standings.
        columns:
          - name: date
            description: Standings as-of date (YYYY-MM-DD)
          - name: teamAbbrev
            description: Serialized JSON {default, fr}
          - name: ingestion_date

      - name: raw_player_bio
        description: >
          Player bio (birth_date, height_in, weight_lb, shoots, position) from
          /v1/player/{id}/landing (Phase 4.4; scripts/ingest_player_bio.py). One row per
          player per ingestion; stg_player_bio keeps the latest.
        columns:
          - name: player_id
          - name: birth_date
          - name: ingestion_date

      - name: raw_contracts
        description: >
          Player-contract snapshot (Trade tool P1; scripts/load_contracts.py). A DATED
          snapshot (currently a scraped CSV, schema structured to swap to an API): every
          row stamped with as_of_date + season. Source-faithful — dollars are strings
          ("$17,000,000"), term is "8 yrs", waivers_exempt is "Yes"/"No"; all parsing is
          deferred to stg_contracts. One row per player-contract per snapshot.
        columns:
          - name: player_name_src
            description: Contract name as scraped ("Last, First")
          - name: team
            description: Team abbreviation on the contract
          - name: cap_hit
            description: Annual cap charge as a dollar string ("$17,000,000")
          - name: as_of_date
            description: Snapshot date (DATE) — everything downstream is stamped with it
          - name: season
            description: Season STRING the snapshot belongs to (e.g. "2025-26")

      - name: raw_contracts_rfa
        description: >
          Pending-RFA snapshot (scripts/load_rfas.py). A SEPARATE feed from raw_contracts with a
          DIFFERENT schema: an RFA's deal has expired, so there are no signed terms — instead the
          source carries the PROJECTED next deal (proj_cap / proj_term), the qualifying offer (qo),
          and last-season stats (gp, toi, points). NO team column (derived downstream from the
          player's latest NHL game). Source-faithful strings; parsed in stg_contracts_rfa.
        columns:
          - name: player_name_src
            description: RFA name as scraped ("Last, First")
          - name: proj_cap
            description: Projected next-contract AAV as a dollar string ("$3,082,778")
          - name: proj_term
            description: Projected next-contract term ("2 yrs")
          - name: qo
            description: Qualifying-offer amount as a dollar string (the floor to retain rights)
          - name: as_of_date
            description: Snapshot date (DATE)
          - name: season
            description: Season STRING the snapshot belongs to (e.g. "2025-26")

      - name: raw_prospects
        description: >
          Org prospect lists (Trade tool P5; scripts/ingest_futures.py -> /v1/prospects/{TEAM}).
          One row per prospect, bounded to each team's published list, enriched with draft pedigree
          (overall pick) from the player landing payload. Dated snapshot (as_of_date + season);
          birth_date kept as a source string, cast in stg_prospects.
        columns:
          - name: player_id
            description: Canonical NHL player id
          - name: org_team
            description: Team abbreviation whose prospect list the player appears on
          - name: draft_overall
            description: Overall draft pick number (null if undrafted)
          - name: as_of_date
            description: Snapshot date

      - name: raw_draft_picks
        description: >
          Future draft picks as tradeable assets (Trade tool P5; scripts/ingest_futures.py). One row
          per (original_team, draft_year, round). PICK OWNERSHIP IS NOT IN ANY FEED — every pick is
          assumed to belong to its original team (ownership_source='assumed_own') unless a manual
          override (models_ml/data/draft_pick_overrides.csv) reassigns it. Known gap, carried in a
          column not baked in silently. Dated snapshot (as_of_date + season).
        columns:
          - name: draft_year
            description: Draft year the pick is for
          - name: round
            description: Draft round (1-7)
          - name: original_team
            description: Team whose native pick this is
          - name: owner_team
            description: Team assumed/known to control the pick
          - name: ownership_source
            description: assumed_own (default) or override (from the manual file)

      - name: raw_draft_results
        description: >
          Historical draft RESULTS — who was actually selected at each pick (Handoff 5, Phase A;
          scripts/ingest_draft_results.py -> /v1/draft/picks/{year}/all). One row per pick, the
          complete evaluation UNIVERSE for the Draft Value tool (every pick kept, incl. players who
          never reached the NHL = never-NHL value 0 downstream). DISTINCT from raw_draft_picks
          (future pick ownership). The source carries NO player_id and NO birth_date; player_id is
          resolved in stg_draft_results by a (draft_year, overall_pick) join to raw_player_draft_origin.
          Idempotent per draft_year (delete-then-append). Backfilled 2005-2025.
        columns:
          - name: draft_year
            description: Draft year (e.g. 2015)
          - name: overall_pick
            description: Dense overall selection number 1..N within the year
          - name: round
            description: Draft round (1-9; 7 since 2005, more pre-2005)
          - name: team_abbrev
            description: Team that made the selection
          - name: full_name
            description: Player selected (display + the (year, overall) join cross-check; no id in source)

      - name: raw_player_draft_origin
        description: >
          Each producing player's authoritative draft origin (Handoff 5, Phase A;
          scripts/ingest_player_draft_origin.py -> /v1/player/{id}/landing draftDetails). One row per
          player in the producing universe (mart_player_game_stats). The reliable resolver for draft
          results: stg_draft_results joins raw_draft_results on (draft_year, overall_pick) to this
          table's draft_overall to attach resolved_player_id. Undrafted players kept (null draft fields,
          is_undrafted=true) so they are known-checked, not skipped.
        columns:
          - name: player_id
            description: Canonical NHL player id (the resolution target)
          - name: draft_year
            description: Year the player was drafted (null if undrafted)
          - name: draft_overall
            description: Overall pick the player was taken at (the join key; null if undrafted)
          - name: full_name
            description: Player name from the landing payload (join cross-check vs raw_draft_results)
          - name: is_undrafted
            description: True when the landing payload has no draftDetails

      - name: raw_ppt_replay
        description: >
          ppt-replay goal tracking, one row per (game_id, event_id) goal. Real per-frame
          player + puck coordinates from wsr.nhle.com sprite files. goal_metadata and the
          frames array are serialized JSON strings; parsed by stg_ppt_tracking_frames.
        columns:
          - name: game_id
            description: NHL game id
          - name: event_id
            description: Play-by-play eventId of the goal
          - name: goal_metadata
            description: Serialized JSON goal metadata (carries timeInPeriod for alignment)
          - name: frames
            description: Serialized JSON array of tracking frames ({timeStamp, onIce})
          - name: frame_count
            description: Number of frames in the sprite
          - name: ingestion_date

      - name: raw_rosters
        description: >
          LIVE team rosters (membership feed; scripts/refresh_rosters.py ->
          api-web /v1/roster/{TEAM}/{season8}, resolved as max(/roster-season)). One row per
          (team_abbrev, ingestion_date). The forwards/defensemen/goalies arrays are serialized
          JSON strings (locale name objects drift per player), parsed by stg_roster_current.
          This fixes a player's CURRENT TEAM LABEL before he dresses for a game; it does NOT
          update performance (a just-traded player keeps old-team value until he plays). Daily
          appends stack snapshots; stg_roster_current keeps the newest ingestion per player.
        columns:
          - name: team_abbrev
            description: Team abbreviation this roster belongs to (implied by the per-team endpoint)
          - name: season8
            description: Resolved 8-digit season the roster is for (e.g. 20252026)
          - name: season
            description: Human season string "YYYY-YY" of the resolved roster (loader-added)
          - name: forwards
            description: Serialized JSON array of forward player objects (id, name, positionCode, ...)
          - name: defensemen
            description: Serialized JSON array of defenseman player objects
          - name: goalies
            description: Serialized JSON array of goalie player objects
          - name: ingestion_date
            description: Date the roster snapshot was ingested (newest wins in stg_roster_current)
