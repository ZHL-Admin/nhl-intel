version: 2

models:
  - name: mart_team_game_stats
    description: Team-level game statistics with advanced analytics metrics
    columns:
      - name: game_id
        description: Unique NHL game identifier
        tests:
          - not_null
      - name: game_date
        description: Date the game was played
        tests:
          - not_null
      - name: season
        description: NHL season identifier
      - name: team_id
        description: NHL team identifier
        tests:
          - not_null
      - name: team_abbrev
        description: Team abbreviation
      - name: home_away
        description: Whether team was home or away
        tests:
          - accepted_values:
              values: ['home', 'away']
      - name: goals_for
        description: Goals scored by team
      - name: goals_against
        description: Goals against team
      - name: shot_attempts_for
        description: Shot attempts for at 5v5
      - name: shot_attempts_against
        description: Shot attempts against at 5v5
      - name: high_danger_for
        description: High-danger chances for
      - name: high_danger_against
        description: High-danger chances against
      - name: cf_pct
        description: Corsi for percentage at 5v5
      - name: hdcf_per60
        description: High-danger chances for per 60 minutes at 5v5
      - name: hdca_per60
        description: High-danger chances against per 60 minutes at 5v5
      - name: zone_entry_proxy_success_rate
        description: >
          Derived proxy: inferred from consecutive event zone codes at 5v5, not measured
          entries. Undercounts entries that produce no recorded event.
      - name: toi_5v5_minutes
        description: Estimated time on ice at 5v5 in minutes

  - name: mart_player_game_stats
    description: Player-level game statistics with advanced analytics metrics
    columns:
      - name: game_id
        description: Unique NHL game identifier
        tests:
          - not_null
      - name: game_date
        description: Date the game was played
        tests:
          - not_null
      - name: player_id
        description: Unique NHL player identifier
        tests:
          - not_null
      - name: team_id
        description: NHL team identifier
        tests:
          - not_null
      - name: first_name
        description: Player first name
      - name: last_name
        description: Player last name
      - name: position_code
        description: Player position code
        tests:
          - accepted_values:
              values: ['C', 'L', 'R', 'D', 'G']
      - name: toi_5v5
        description: Estimated time on ice at 5v5 in minutes
      - name: ixg_per60
        description: Individual expected goals per 60 minutes (using high-danger attempts as proxy)
      - name: on_ice_xgf_pct
        description: >
          Real 5v5 on-ice xGF share from shift-by-shift reconstruction
          (int_player_onice_game). Replaces the former team-level proxy; null where the
          player logged no 5v5 ice (e.g. goalies).
      - name: off_ice_xgf_pct
        description: 5v5 xGF share for the player's team while the player is off the ice
      - name: rel_xgf_pct
        description: on_ice_xgf_pct - off_ice_xgf_pct (the true relative)
      - name: primary_points_per60
        description: Goals plus primary assists per 60 minutes
      - name: hot_cold_flag
        description: Whether player is performing above (hot) or below (cold) season average
        tests:
          - accepted_values:
              values: ['hot', 'cold', 'neutral']

  - name: mart_team_rolling
    description: Rolling 5-game averages of team metrics
    columns:
      - name: game_id
        description: Unique NHL game identifier
        tests:
          - not_null
      - name: game_date
        description: Date the game was played
        tests:
          - not_null
      - name: season
        description: NHL season identifier
      - name: team_id
        description: NHL team identifier
        tests:
          - not_null
      - name: team_abbrev
        description: Team abbreviation
      - name: current_cf_pct
        description: Corsi for percentage for this game
      - name: rolling_cf_pct_5gp
        description: Rolling 5-game average of Corsi for percentage
      - name: current_hdcf_per60
        description: High-danger chances for per 60 for this game
      - name: rolling_hdcf_per60_5gp
        description: Rolling 5-game average of high-danger chances for per 60
      - name: current_hdca_per60
        description: High-danger chances against per 60 for this game
      - name: rolling_hdca_per60_5gp
        description: Rolling 5-game average of high-danger chances against per 60
      - name: has_full_5game_sample
        description: Whether team has played at least 5 games
        tests:
          - not_null

  - name: mart_daily_report_feed
    description: Denormalized view of all game data for daily report generation
    columns:
      - name: game_date
        description: Date the game was played
        tests:
          - not_null
      - name: game_id
        description: Unique NHL game identifier
        tests:
          - not_null
      - name: team_id
        description: NHL team identifier
        tests:
          - not_null
      - name: team_abbrev
        description: Team abbreviation
      - name: home_away
        description: Whether team was home or away
      - name: goals_for
        description: Goals scored by team
      - name: goals_against
        description: Goals against team
      - name: cf_pct
        description: Corsi for percentage at 5v5
      - name: hdcf_per60
        description: High-danger chances for per 60 minutes
      - name: hdca_per60
        description: High-danger chances against per 60 minutes
      - name: rolling_cf_pct_5gp
        description: Rolling 5-game average of Corsi for percentage
      - name: top_player_name
        description: Name of top-performing player in game
      - name: top_player_points_per60
        description: Points per 60 for top player
      - name: top_player_hot_cold
        description: Hot/cold flag for top player

  - name: mart_player_faceoff_zones
    description: >
      Season-level per-player faceoff results by zone (offensive/neutral/defensive)
      from the stats-REST faceoffwins report. This is the SEASON / set-play complement
      to the event-derived per-GAME team faceoff data in mart_team_faceoffs — the two
      are deliberately kept separate (different grain and data source). A team-season
      rollup, if needed, is a trivial group-by on this model and is not duplicated here.
    columns:
      - name: player_id
        description: NHL player identifier
        tests:
          - not_null
      - name: season_id
        description: Season as YYYYYYYY (integer)
        tests:
          - not_null
      - name: oz_faceoff_win_pct
        description: Offensive-zone faceoff win percentage (null-safe)
      - name: dz_faceoff_win_pct
        description: Defensive-zone faceoff win percentage (null-safe)

  - name: mart_edge_player_profile
    description: >
      Per player-season NHL Edge profile: skating speed/bursts, distance, shot speed,
      zone time/starts (all + even-strength), and danger-bucket shot share. Burst
      rates per 60 use REAL season TOI from stg_shifts (null-safe when TOI absent).
      Season-aggregate tracking data, never joined to plays.
    columns:
      - name: player_id
        tests: [not_null]
      - name: season_id
        tests: [not_null]
      - name: bursts_22_plus_per60
        description: 22+ mph bursts per 60 min of real shift TOI (null when TOI=0)

  - name: mart_edge_team_profile
    description: >
      Per team-season NHL Edge profile: NHL danger-bucket (high/mid/long) shot shares.
      Goalie HD aggregates are intentionally NOT joined (Edge goalie data has no team
      linkage and no HD split; goalie danger lives in the Phase 2.5 goaltending marts).
    columns:
      - name: team_id
        tests: [not_null]
      - name: season_id
        tests: [not_null]

  - name: mart_goalie_game_stats
    description: >
      Per goalie-game GSAx on the in-house xG layer (Phase 2.5). xGA over all unblocked
      shots faced (calibrated); saves/save% on-goal only; GSAx split by danger tier and
      strength. See docs/methodology/goaltending.md.
    columns:
      - name: game_id
        tests: [not_null]
      - name: goalie_id
        tests: [not_null]
      - name: gsax
        description: Goals saved above expected (xGA - GA)

  - name: mart_goalie_season
    description: >
      Goalie season GSAx aggregates + last-10 rolling GSAx + NHL Edge second opinion
      (overall last-10 save pct; no HD split). our_hd_gsax vs edge_last10_save_pct are the
      two distinct sources (blueprint 12.3). See docs/methodology/goaltending.md.
    columns:
      - name: goalie_id
        tests: [not_null]
      - name: season
        tests: [not_null]

  - name: mart_player_contracts
    description: >
      One row per matched player per contract snapshot (Trade tool P3): the parsed contract
      joined to the canonical player_id. The PLAYER contract layer — prospects without an NHL
      id are absent by design (valued in the futures layer). Carries the cap hit, the flat cap
      schedule over remaining years, cash split, UFA/RFA status, and the match provenance.
      Tested for cap_hit >= league min and 0 <= remaining_years <= 8 (singular tests).
    columns:
      - name: player_id
        description: Canonical NHL player id
        tests: [not_null]
      - name: as_of_date
        description: Snapshot date (with player_id, the grain key)
        tests: [not_null]
      - name: cap_hit
        description: Annual cap charge in dollars
        tests: [not_null]
      - name: aav
        description: Average annual value in dollars
      - name: remaining_years
        description: Seasons left on the deal counting the snapshot season
      - name: total_remaining_cap
        description: cap_hit * remaining_years (flat cap schedule)
      - name: is_ufa
        description: Expires to unrestricted free agency
      - name: match_method
        description: How player_id was resolved (auditable)
      - name: match_confidence
        description: high (direct/override) or medium (surname tier)

  - name: mart_tradeable_assets
    description: >
      The unified tradeable-asset layer (Trade tool P7): every player, prospect, and draft pick as
      one row with one interface (asset_id, asset_type, label, org, value+band, cost, surplus,
      confidence) in the same WAR + dollar currency. Players come from contract surplus; prospects
      and picks from the futures proxy. A prospect who is also a rostered player appears once (as the
      player). The grain key is asset_id.
    columns:
      - name: asset_id
        description: Stable key (player:<id> / prospect:<id> / pick:<team>:<year>:R<round>)
        tests: [not_null, unique]
      - name: asset_type
        description: player | prospect | pick
        tests:
          - not_null
          - accepted_values:
              values: ['player', 'prospect', 'pick']
      - name: label
        description: Display name (player/prospect name, or pick label)
        tests: [not_null]
      - name: surplus_dollars
        description: Headline tradeable surplus in dollars (value minus cost)
      - name: confidence
        description: high / medium / proxy

  - name: mart_player_onice
    description: >
      Season 5v5 on-ice / off-ice profile per (season, player_id, team_id), rolled up from
      int_player_onice_game. rel_xgf_pct / rel_cf_pct are the true on-ice-minus-off-ice
      relatives (the corrected replacement for the player-minus-team-average proxy). Raw
      season on-ice sums are kept so mart_player_wowy can subtract the together portion.
    columns:
      - name: season
        tests: [not_null]
      - name: player_id
        tests: [not_null]
      - name: team_id
        tests: [not_null]
      - name: toi_5v5_sec
        description: Season on-ice 5v5 seconds
        tests: [not_null]
      - name: on_ice_xgf_pct
        description: Season on-ice 5v5 xGF share
      - name: rel_xgf_pct
        description: on_ice_xgf_pct - off_ice_xgf_pct

  - name: mart_player_toi_matrix
    description: >
      Pairwise shared 5v5 ice per (season, team_id, player_id_a < player_id_b): the raw
      entanglement / pair-quality input for a team TOI-matrix view. Skaters only; each 5v5
      segment contributes its duration to every unordered same-team pair on the ice. Stored
      once per unordered pair (union the mirror for a symmetric view).
    columns:
      - name: season
        tests: [not_null]
      - name: team_id
        tests: [not_null]
      - name: player_id_a
        tests: [not_null]
      - name: player_id_b
        tests: [not_null]
      - name: toi_together_sec
        description: Shared 5v5 seconds for the pair across the season (>= 0)
        tests: [not_null]

  - name: mart_player_wowy
    description: >
      With-Or-Without-You per (season, team_id, focal player_id, partner_id): 5v5 on-ice
      xGF% together vs each player apart from the other. Directional (one row per ordered
      focal->partner). Together sums come from segment co-occurrence; each apart split is the
      player's season on-ice total minus the together portion (leakage-free).
      small_sample = toi_together_sec < 3000 (50 minutes, decision D17).
    columns:
      - name: season
        tests: [not_null]
      - name: team_id
        tests: [not_null]
      - name: player_id
        description: Focal player
        tests: [not_null]
      - name: partner_id
        description: Partner the focal is measured with/without
        tests: [not_null]
      - name: toi_together_sec
        description: Shared 5v5 seconds (focal + partner both on ice)
        tests: [not_null]
      - name: xgf_pct_together
        description: On-ice xGF share with the pair together
      - name: small_sample
        description: True when shared time is under 3000 seconds (50 minutes)
        tests: [not_null]

  - name: mart_player_quality_context
    description: >
      Quality of Competition / Teammates per (season, player_id, team_id): TOI-weighted mean
      PRIOR-season WAR rate of skaters faced (QoC) and played with (QoT) at 5v5, plus within-
      position percentiles. Leak-free (quality from player_prior_quality, each skater's rate as of
      the previous season). QoC/QoT LEVELS only (spec v1); tercile splits are v1.1.
    columns:
      - name: season
        tests: [not_null]
      - name: player_id
        tests: [not_null]
      - name: team_id
        tests: [not_null]
      - name: pos_group
        tests:
          - not_null
          - accepted_values: {values: ['F', 'D']}
      - name: toi_5v5_sec
        description: Focal player's 5v5 seconds (the weight basis)
        tests: [not_null]
      - name: qoc_war_rate
        description: TOI-weighted mean prior-season WAR rate of opposing skaters
        tests: [not_null]
      - name: qot_war_rate
        description: TOI-weighted mean prior-season WAR rate of same-team on-ice skaters
        tests: [not_null]
      - name: qoc_pctile
        description: QoC percentile within (season, pos_group)
      - name: qot_pctile
        description: QoT percentile within (season, pos_group)

  - name: mart_player_entanglement
    description: >
      Per (season, player_id, team_id) partner-concentration diagnostic for the impact-context
      layer, from a symmetric view of mart_player_toi_matrix. max_partner_toi_share is the most
      common partner's shared 5v5 TOI over the player's own 5v5 TOI; partner_entropy is the
      normalized Shannon entropy of the partner-TOI distribution (0 = welded to one, 1 = spread).
      entangled = share > 0.55 (D18). Qualified at the 200-5v5-minute floor (12000 s).
    columns:
      - name: season
        tests: [not_null]
      - name: player_id
        tests: [not_null]
      - name: team_id
        tests: [not_null]
      - name: max_partner_toi_share
        description: Most-common-partner shared 5v5 TOI / player's own 5v5 TOI (0..1)
      - name: entangled
        description: True when max_partner_toi_share > 0.55
        tests: [not_null]

  - name: mart_player_carry
    description: >
      Per (season, player_id) carry score: TOI-weighted mean over partners of the WOWY field
      partner_with_focal_minus_partner_without (partner's on-ice xGF% with the focal minus
      without), weighted by shared 5v5 TOI. Positive = the player elevates partners. Grain is
      (season, player_id) so a traded player's partners across both teams roll into one score.
      Qualified at the 200-5v5-minute floor (12000 s).
    columns:
      - name: season
        tests: [not_null]
      - name: player_id
        tests: [not_null]
      - name: carry_score
        description: TOI-weighted mean partner with-minus-without xGF% delta
      - name: partner_count
        description: Distinct partners contributing to the score

  - name: mart_player_impact_context
    description: >
      Per (season, player_id, position_group) transparent context around the isolated-impact
      (RAPM) estimate. Reads nhl_models.player_impact plus entanglement, carry, and the true
      on-off relative. Computes NO blended score and NO ranking; every field is kept separate.
      single_vs_multi_delta = single-season total impact minus the 3-year weighted window total
      (null when no window row). Goalies excluded. See docs/methodology/impact-context.md.
    columns:
      - name: season
        tests: [not_null]
      - name: player_id
        tests: [not_null]
      - name: position_group
        description: F or D (goalies excluded)
        tests:
          - not_null
          - accepted_values:
              values: ['F', 'D']
      - name: total_impact
        description: Single-season off_impact + def_impact (xGF/60, higher better)
      - name: single_vs_multi_delta
        description: Single-season total minus 3-year window total (null if no window row)
      - name: entangled
        description: True when the player's max partner TOI share exceeds 0.55
        tests: [not_null]
