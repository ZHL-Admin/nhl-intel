version: 2

models:
  - name: stg_games
    description: >
      Game schedule spine from raw_games (game_id, date, season) enriched with
      played-game detail from stg_boxscores. The raw schedule feed only stores
      game ids and dates, so team/score/venue/state columns are sourced from the
      boxscore and are null for any scheduled-but-unplayed game.
    columns:
      - name: game_id
        description: Unique NHL game identifier
        tests:
          - not_null
          - unique
      - name: season
        description: NHL season identifier string (e.g. "2024-25")
        tests:
          - not_null
      - name: game_date
        description: Date the game was scheduled
        tests:
          - not_null
      - name: game_type
        description: Game type code from boxscore (2=regular season, 3=playoffs); null if unplayed
      - name: start_time_utc
        description: Game start time in UTC (from boxscore)
      - name: venue_name
        description: Name of the arena (from boxscore)
      - name: eastern_utc_offset
        description: UTC offset for Eastern time zone (from boxscore)
      - name: venue_utc_offset
        description: UTC offset for venue time zone (from boxscore)
      - name: game_state
        description: Current state of the game (from boxscore)
      - name: game_schedule_state
        description: Scheduling state of the game (from boxscore)
      - name: away_team_id
        description: NHL team ID for away team (from boxscore); null if unplayed
      - name: away_team_abbrev
        description: Three-letter abbreviation for away team (from boxscore)
      - name: away_team_score
        description: Final score for away team (from boxscore)
      - name: home_team_id
        description: NHL team ID for home team (from boxscore); null if unplayed
      - name: home_team_abbrev
        description: Three-letter abbreviation for home team (from boxscore)
      - name: home_team_score
        description: Final score for home team (from boxscore)
      - name: last_period_type
        description: Type of the last period played (from boxscore)
      - name: ingestion_date
        description: Date when raw schedule data was ingested
        tests:
          - not_null
      - name: _loaded_at
        description: Timestamp when staging model was loaded
        tests:
          - not_null

  - name: stg_boxscores
    description: Cleaned boxscore data with team-level statistics for each game
    columns:
      - name: game_id
        description: Unique NHL game identifier
        tests:
          - not_null
          - unique
      - name: id
        description: Game ID from API response
        tests:
          - not_null
      - name: season
        description: NHL season identifier
        tests:
          - not_null
      - name: game_type
        description: Game type code (2=regular season, 3=playoffs)
        tests:
          - not_null
      - name: game_date
        description: Date the game was played
        tests:
          - not_null
      - name: start_time_utc
        description: Game start time in UTC
      - name: eastern_utc_offset
        description: UTC offset for Eastern time zone
      - name: venue_utc_offset
        description: UTC offset for venue time zone
      - name: game_state
        description: Current state of the game
      - name: game_schedule_state
        description: Scheduling state of the game
      - name: limited_scoring
        description: Whether game had limited scoring
      - name: reg_periods
        description: Number of regulation periods
      - name: venue_name
        description: Name of the arena
      - name: venue_location
        description: City and state/province of venue
      - name: current_period
        description: Current period number
      - name: current_period_type
        description: Type of current period
      - name: time_remaining
        description: Time remaining in current period
      - name: seconds_remaining
        description: Seconds remaining in current period
      - name: clock_running
        description: Whether game clock is running
      - name: in_intermission
        description: Whether game is in intermission
      - name: home_team_id
        description: NHL team ID for home team
        tests:
          - not_null
      - name: home_team_name
        description: Full name of home team
      - name: home_team_abbrev
        description: Three-letter abbreviation for home team
      - name: home_team_score
        description: Final score for home team
      - name: home_team_sog
        description: Shots on goal for home team
      - name: away_team_id
        description: NHL team ID for away team
        tests:
          - not_null
      - name: away_team_name
        description: Full name of away team
      - name: away_team_abbrev
        description: Three-letter abbreviation for away team
      - name: away_team_score
        description: Final score for away team
      - name: away_team_sog
        description: Shots on goal for away team
      - name: last_period_type
        description: Type of the last period played
      - name: ingestion_date
        description: Date when raw data was ingested
        tests:
          - not_null
      - name: _loaded_at
        description: Timestamp when staging model was loaded
        tests:
          - not_null

  - name: stg_play_by_play
    description: Play-by-play event data with one row per event, unnested from raw API responses
    columns:
      - name: game_id
        description: Unique NHL game identifier
        tests:
          - not_null
      - name: api_game_id
        description: Game ID from API response
        tests:
          - not_null
      - name: event_id
        description: Unique event identifier within the game
        tests:
          - not_null
      - name: season
        description: NHL season identifier
        tests:
          - not_null
      - name: game_date
        description: Date the game was played
        tests:
          - not_null
      - name: period_number
        description: Period number when event occurred
      - name: period_type
        description: Period type (REG, OT, SO)
      - name: time_in_period
        description: Time elapsed in period (MM:SS format)
      - name: time_remaining
        description: Time remaining in period (MM:SS format)
      - name: situation_code
        description: Game situation code (strength state)
      - name: type_code
        description: Numeric event type code
      - name: type_desc_key
        description: Event type description (shot-on-goal, goal, faceoff, etc)
        tests:
          - not_null
      - name: sort_order
        description: Sort order for events with same timestamp
      - name: home_team_defending_side
        description: Which side home team is defending (left/right)
      - name: x_coord
        description: X coordinate on ice surface (-100 to 100)
      - name: y_coord
        description: Y coordinate on ice surface (-42.5 to 42.5)
      - name: zone_code
        description: Zone where event occurred (O=offensive, D=defensive, N=neutral)
      - name: shot_type
        description: Type of shot (wrist, slap, snap, backhand, etc)
      - name: reason
        description: Additional event context (wide-left, high, etc)
      - name: shooting_player_id
        description: Player ID who took the shot
      - name: scoring_player_id
        description: Player ID who scored the goal
      - name: goalie_in_net_id
        description: Goalie player ID
      - name: assist1_player_id
        description: Primary assist player ID
      - name: assist2_player_id
        description: Secondary assist player ID
      - name: blocking_player_id
        description: Player ID who blocked the shot
      - name: hitting_player_id
        description: Player ID who delivered the hit
      - name: committed_by_player_id
        description: Player ID who committed the penalty
      - name: event_owner_team_id
        description: Team ID that owns the event
      - name: home_score
        description: Home team score after this event
      - name: away_score
        description: Away team score after this event
      - name: ingestion_date
        description: Date when raw data was ingested
        tests:
          - not_null
      - name: _loaded_at
        description: Timestamp when staging model was loaded
        tests:
          - not_null

  - name: stg_rosters
    description: Player roster information with one row per player per game
    columns:
      - name: game_id
        description: Unique NHL game identifier
        tests:
          - not_null
      - name: api_game_id
        description: Game ID from API response
        tests:
          - not_null
      - name: player_id
        description: Unique NHL player identifier
        tests:
          - not_null
      - name: team_id
        description: NHL team identifier
        tests:
          - not_null
      - name: season
        description: NHL season identifier
        tests:
          - not_null
      - name: game_date
        description: Date the game was played
        tests:
          - not_null
      - name: first_name
        description: Player first name
      - name: last_name
        description: Player last name
      - name: sweater_number
        description: Player jersey number
      - name: position_code
        description: Player position code (C, L, R, D, G)
      - name: headshot_url
        description: URL to player headshot image
      - name: ingestion_date
        description: Date when raw data was ingested
        tests:
          - not_null
      - name: _loaded_at
        description: Timestamp when staging model was loaded
        tests:
          - not_null

  - name: stg_shifts
    description: >
      One row per shift per player per game, parsed from nhl_raw.raw_shift_charts.
      Goal-event annotation rows (typeCode 505, null duration) are excluded. Times
      are game-elapsed seconds; OT handled via (period-1)*1200 period offsets.
    columns:
      - name: game_id
        description: Unique NHL game identifier
        tests:
          - not_null
      - name: player_id
        description: NHL player identifier for the skater/goalie on this shift
        tests:
          - not_null
      - name: team_id
        description: Team the player was on
      - name: period
        description: Period number (4+ = overtime)
      - name: shift_start_seconds
        description: Game-elapsed seconds at shift start
      - name: shift_end_seconds
        description: Game-elapsed seconds at shift end
      - name: duration_seconds
        description: Shift length in seconds (1..1200; 1200 = a goalie's full period)

  - name: stg_statsrest_faceoffs
    description: >
      Season-level per-player faceoff splits (zone + ev/pp/sh win/loss counts) from
      the stats-REST skater/faceoffwins report. SEASON grain — this complements, and
      does NOT replace, the event-derived per-GAME faceoff data in mart_team_faceoffs.
      Use this for set-play/zone faceoff analysis; use mart_team_faceoffs for per-game
      team faceoff outcomes.
    columns:
      - name: player_id
        description: NHL player identifier
        tests:
          - not_null
      - name: season_id
        description: Season as YYYYYYYY (integer)
        tests:
          - not_null
      - name: total_faceoffs
        description: Total faceoffs taken in the season
      - name: oz_faceoff_wins
        description: Offensive-zone faceoff wins
      - name: dz_faceoff_wins
        description: Defensive-zone faceoff wins

  - name: stg_standings
    description: >
      League standings as of a date (one row per team per date), parsed from
      raw_standings. Carries points/record, league/conference/division ranks, and
      last-10 (l10*) splits. The /games/{id}/context endpoint joins l10* as-of the
      game date because last-10 records are absent from the landing/right-rail payloads.
    columns:
      - name: team_abbrev
        description: Team abbreviation (e.g. "COL")
        tests:
          - not_null
      - name: standings_date
        description: Standings as-of date (YYYY-MM-DD)
        tests:
          - not_null
      - name: points
        description: Standings points
      - name: l10_wins
        description: Wins in the team's last 10 games as of the date

  - name: stg_game_context
    description: >
      One row per game of pregame/postgame context for the GameDetail surface:
      scratches and head coaches (from right-rail gameInfo), season series wins +
      prior meetings, team game-stat comparisons, and per-goal highlight video links
      keyed by event_id (from landing summary.scoring). Last-10 records are NOT here
      (absent from the source payloads); they are joined from stg_standings in the API.
    columns:
      - name: game_id
        description: Unique NHL game identifier
        tests:
          - not_null
          - unique
      - name: goal_highlights
        description: >
          Array of per-goal records (event_id, period, scorer_player_id,
          time_in_period, highlight_url, ppt_replay_url).
      - name: away_scratches
        description: Array of {player_id, player_name} scratched for the away team

  - name: stg_partner_odds
    description: >
      De-vigged implied win probabilities from partner sportsbook snapshots.
      INTERNAL CALIBRATION ONLY (blueprint 13.2) — there is intentionally NO backend
      endpoint and NO frontend surface for this model; it exists only so Phase 2.4 can
      benchmark our win-probability model against the market. PENDING in-season
      validation of the american-odds JSON path (probed in the offseason with an empty
      games[] array — see scripts/STATSREST_FINDINGS.md).
    columns:
      - name: game_id
        description: NHL game identifier
      - name: home_win_prob_devig
        description: De-vigged implied home win probability (normalized pair sums to 1)

  - name: stg_edge_skaters
    description: >
      NHL Edge skater season aggregates, pivoted from the 5 per-report raw rows into
      one typed row per (player, season, game_type): skating speed/bursts, distance,
      shot speed, zone time (all + even-strength) + zone starts, danger-bucket shots.
      Season-aggregate profile data — never joined to individual plays.
    columns:
      - name: player_id
        tests: [not_null]
      - name: season_id
        description: Season as YYYYYYYY (integer)
        tests: [not_null]
      - name: oz_time_pct
        description: Offensive-zone time share, all strengths (oz+nz+dz sum to 1)

  - name: stg_edge_goalies
    description: >
      NHL Edge goalie season aggregates. SCOPE: the Edge endpoint exposes only
      gamesAbove900 / pctgGamesAbove900 + a last-10 per-game save pct list — NO
      high-danger or 5v5 save-pct split. Danger splits come from the Phase 2.5
      GSAx marts (our xG layer); this is the independent "quality start" view.
    columns:
      - name: player_id
        tests: [not_null]
      - name: season_id
        tests: [not_null]

  - name: stg_edge_teams
    description: >
      NHL Edge team season aggregates: NHL danger-bucket (high/mid/long) shot counts
      and shares from team-shot-location-detail (position='all' rows).
    columns:
      - name: team_id
        tests: [not_null]
      - name: season_id
        tests: [not_null]

  - name: stg_ppt_tracking_frames
    description: >
      ppt-replay goal tracking: one row per (game_id, event_id, frame_index, entity) —
      the puck (is_puck) plus every on-ice skater per frame. Raw corner-origin coords are
      in INCHES (empirically: 2400 x 1020 grid = 12 x 200ft by 12 x 85ft) and are
      transformed to the standard center-origin feet system (x_std=raw_x/12-100,
      y_std=raw_y/12-42.5). See docs/methodology/ppt-replay-tracking.md.
    columns:
      - name: game_id
        tests: [not_null]
      - name: event_id
        tests: [not_null]
      - name: x_std
        description: Puck/skater x in standard feet (center-origin; goal line ±89)
      - name: is_puck
        description: True for the puck entity (entityKey '1')

  - name: stg_contracts
    description: >
      Typed/parsed view over the dated contract snapshot (raw_contracts). Dollars become
      INT64, "8 yrs" becomes term_years, "Yes"/"No" becomes a bool. Season-aware:
      remaining_years counts down from the snapshot's season. One row per player-contract
      per snapshot; prospects are still present here (matching to player_id happens in
      mart_player_contracts).
    columns:
      - name: player_name_src
        description: Contract name ("Last, First"); join key to contract_player_map
        tests: [not_null]
      - name: season
        description: Season STRING the snapshot belongs to
        tests: [not_null]
      - name: as_of_date
        description: Snapshot date
        tests: [not_null]
      - name: cap_hit
        description: Annual cap charge in dollars (INT64)
        tests: [not_null]
      - name: aav
        description: Average annual value in dollars (INT64)
        tests: [not_null]
      - name: term_years
        description: Contract length in years (parsed from "N yrs")
      - name: expiry_year
        description: Calendar year the contract expires (July)
      - name: remaining_years
        description: Seasons left counting the snapshot season (>= 0)
      - name: is_ufa
        description: True if the contract expires to unrestricted free agency
      - name: is_elc
        description: True for entry-level contracts

  - name: stg_prospects
    description: >
      Typed org prospect lists (Trade tool P5), one row per prospect on the latest snapshot with
      draft pedigree (overall pick) and a computed age. Bounded to org lists.
    columns:
      - name: player_id
        description: Canonical NHL player id
        tests: [not_null, unique]
      - name: org_team
        description: Team whose prospect list the player is on
        tests: [not_null]
      - name: pos_group
        description: F / D / G
        tests:
          - accepted_values:
              values: ['F', 'D', 'G']
      - name: draft_overall
        description: Overall draft pick (null if undrafted)
      - name: as_of_date
        description: Snapshot date
        tests: [not_null]

  - name: stg_roster_current
    description: >
      Live team-roster membership (NOT game-derived): one row per player on a team's current
      roster, newest ingestion snapshot per player. Source nhl_raw.raw_rosters. Fixes the team
      LABEL before a player dresses; performance is unaffected until he plays.
    columns:
      - name: player_id
        description: Canonical NHL player id
        tests:
          - not_null
          - unique
      - name: team_id
        description: Current team id (resolved from team_abbrev via mart_team_game_stats)
      - name: team_abbrev
        description: Current team abbreviation (from the per-team roster endpoint)
      - name: pos_group
        description: Position group F/D/G (which roster array the player came from)
        tests:
          - accepted_values:
              values: ['F', 'D', 'G']

  - name: stg_draft_picks
    description: >
      Future draft picks as tradeable assets (Trade tool P5), one row per (owner_team, draft_year,
      round) on the latest snapshot. ownership_source flags the own-picks assumption.
    columns:
      - name: draft_year
        description: Draft year
        tests: [not_null]
      - name: round
        description: Draft round 1-7
        tests: [not_null]
      - name: owner_team
        description: Team assumed/known to control the pick
        tests: [not_null]
      - name: ownership_source
        description: assumed_own or override
        tests:
          - accepted_values:
              values: ['assumed_own', 'override']

  - name: stg_draft_results
    description: >
      Historical draft RESULTS (Handoff 5, Phase A) — one row per (draft_year, overall_pick), the
      complete evaluation universe for the Draft Value tool. Every pick kept; players who never
      reached the NHL resolve to a null resolved_player_id (never-NHL value 0 downstream, not
      missing). DISTINCT from stg_draft_picks (future ownership). resolved_player_id is the
      authoritative (draft_year, overall_pick) join to raw_player_draft_origin; name_match is a
      validation cross-check only.
    columns:
      - name: pick_key
        description: Surrogate "draft_year-overall_pick" — one row per pick
        tests: [not_null, unique]
      - name: draft_year
        description: Draft year
        tests: [not_null]
      - name: overall_pick
        description: Dense overall selection number 1..N
        tests: [not_null]
      - name: round
        description: Draft round (1-9; older drafts had more rounds, so do not restrict to 1-7)
        tests:
          - accepted_values:
              values: [1, 2, 3, 4, 5, 6, 7, 8, 9]
              quote: false
      - name: pos_group
        description: F / D / G
        tests:
          - accepted_values:
              values: ['F', 'D', 'G']
      - name: resolved_player_id
        description: Authoritative player id via (draft_year, overall_pick); null = never reached the NHL
      - name: made_nhl
        description: True when the pick resolved to a player in our production data
