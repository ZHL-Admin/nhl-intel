version: 2

models:
  - name: int_player_current_team
    description: >
      Current-team resolution consulted by the player-side lookups. Live roster
      (stg_roster_current) is the source of truth for current affiliation; the game-derived
      latest-NHL-game team (01/02/03 filter) is the fallback so nobody is dropped. One row per
      player. Resolves the team LABEL only — performance models are untouched.
    columns:
      - name: player_id
        description: Canonical NHL player id
        tests:
          - not_null
          - unique
      - name: current_team_id
        description: Resolved current team id (live roster preferred, else latest-game team)
      - name: is_live_roster
        description: True when the team came from the live roster; false when from latest game
      - name: team_source
        description: Which path resolved the team
        tests:
          - accepted_values:
              values: ['live_roster', 'latest_game']

  - name: int_shot_attempts_all
    description: >
      Shot attempts across all strength states (5v5, special teams, other) with
      per-situation xG. Powers the all-situations xG worm. The 5v5-only
      int_shot_attempts remains the basis for the even-strength possession marts.
    columns:
      - name: game_id
        description: Unique NHL game identifier
        tests:
          - not_null
      - name: xg_value
        description: Expected goals value from the per-situation conversion-rate model

  - name: int_shot_attempts
    description: Shot attempts at 5v5 strength with high-danger classification
    columns:
      - name: game_id
        description: Unique NHL game identifier
        tests:
          - not_null
      - name: event_id
        description: Unique event identifier
        tests:
          - not_null
      - name: period_number
        description: Period when shot occurred
      - name: type_desc_key
        description: Type of shot attempt (shot-on-goal, goal, missed-shot, blocked-shot)
        tests:
          - not_null
          - accepted_values:
              values: ['shot-on-goal', 'goal', 'missed-shot', 'blocked-shot']
      - name: x_coord
        description: X coordinate on ice surface
      - name: y_coord
        description: Y coordinate on ice surface
      - name: shot_type
        description: Type of shot (wrist, slap, snap, etc)
      - name: shooting_player_id
        description: Player who took the shot
      - name: event_owner_team_id
        description: Team that took the shot
        tests:
          - not_null
      - name: is_goal
        description: Whether the shot resulted in a goal
        tests:
          - not_null
      - name: is_high_danger
        description: Whether shot was from high-danger area (|x| > 55, |y| < 22)
        tests:
          - not_null
      - name: is_on_net
        description: Whether shot was on net (goal or shot-on-goal)
        tests:
          - not_null

  - name: int_shot_types
    description: Shot attempts at 5v5 with normalized shot type classification for shot map encoding
    columns:
      - name: game_id
        description: Unique NHL game identifier
        tests:
          - not_null
      - name: season
        description: Season in format YYYY-YY
        tests:
          - not_null
      - name: event_id
        description: Unique event identifier
        tests:
          - not_null
      - name: shot_type
        description: Normalized shot type (snap, slapshot, tip-deflection, backhand, wraparound, other)
        tests:
          - not_null
          - accepted_values:
              values: ['snap', 'slapshot', 'tip-deflection', 'backhand', 'wraparound', 'other']
      - name: shooting_player_id
        description: Player who took the shot
      - name: event_owner_team_id
        description: Team that took the shot
        tests:
          - not_null
      - name: is_goal
        description: Whether the shot resulted in a goal
        tests:
          - not_null
      - name: is_high_danger
        description: Whether shot was from high-danger area
        tests:
          - not_null
      - name: xg_value
        description: Expected goals value for this shot attempt
        tests:
          - not_null

  - name: int_assists
    description: Individual assists per goal with first and second assist distinction
    columns:
      - name: game_id
        description: Unique NHL game identifier
        tests:
          - not_null
      - name: season
        description: Season in format YYYY-YY
        tests:
          - not_null
      - name: goal_event_id
        description: Event ID of the goal this assist belongs to
        tests:
          - not_null
      - name: player_id
        description: Player who recorded the assist
        tests:
          - not_null
      - name: assist_order
        description: Assist order (1 for primary assist, 2 for secondary assist)
        tests:
          - not_null
      - name: game_date
        description: Date the game was played
        tests:
          - not_null
      - name: team_id
        description: Team of the player recording the assist
        tests:
          - not_null

  - name: int_zone_entry_proxy
    description: >
      Derived proxy for zone entries at 5v5, inferred from consecutive event zone-code
      transitions (not directly observable in the NHL API). Undercounts entries that
      produce no recorded event. Controlled/uncontrolled classification is also inferred.
    columns:
      - name: game_id
        description: Unique NHL game identifier
        tests:
          - not_null
      - name: event_id
        description: Unique event identifier
        tests:
          - not_null
      - name: period_number
        description: Period when zone entry occurred
      - name: team_id
        description: Team that entered the zone
        tests:
          - not_null
      - name: is_zone_entry
        description: Whether event represents a zone entry (always true by design)
        tests:
          - not_null
      - name: is_controlled_entry
        description: Whether entry was controlled (true) or dump-in (false)

  - name: int_shift_segments
    description: >
      Shift-overlap segmentation: maximal intervals of unchanged on-ice skaters.
      One row per (game_id, segment_index, player_id). Sub-second line-change
      overlaps (>6 skaters/side) are excluded as documented noise.
    columns:
      - name: game_id
        tests: [not_null]
      - name: segment_index
        tests: [not_null]
      - name: player_id
        tests: [not_null]
      - name: segment_duration
        description: Segment length in seconds (always > 0)

  - name: int_segment_context
    description: >
      One row per (game_id, segment_index): strength state, score at segment start,
      score-state bucket (home perspective), and zone-start faceoff context.
    columns:
      - name: game_id
        tests: [not_null]
      - name: segment_index
        tests: [not_null]
      - name: strength_state
        description: e.g. 5v5, 5v4, 4v5, 4v4, 3v3, EN (home perspective; EN = goalie pulled)

  - name: int_on_ice_events
    description: >
      Every play-by-play event joined to its containing shift segment, with on-ice
      player arrays for (event-owner team) and against (opponent). The attribution
      backbone for on-ice xG, RAPM, GSAx, chemistry, and coach-trust. Events attribute
      to the segment (start, end] so stoppage events credit the line that was playing.
    columns:
      - name: game_id
        tests: [not_null]
      - name: event_id
        tests: [not_null]

  - name: int_goal_release_frame
    description: >
      One row per (game_id, event_id, entity) at each goal's release/arrival frame —
      the puck plus every on-ice skater in standard center-origin coords, team-labeled.
      The release frame is pinned geometrically (puck nearest a net) since the sprite
      carries no frame->game-clock field; see docs/methodology/ppt-replay-tracking.md.
      This is the single tracked moment Phase 6.4 renders on the rink.
    columns:
      - name: game_id
        tests: [not_null]
      - name: event_id
        tests: [not_null]
      - name: x_std
        description: Entity x in standard feet at the release frame (goal line ±89)

  - name: int_shot_sequence
    description: >
      Sequence mining (blueprint 3.2): one row per UNBLOCKED shot attempt (shot-on-goal,
      missed-shot, goal) classified by how it was generated. seq_type is a single
      precedence label (rebound > rush > forecheck > cycle > point_shot > other) and the
      individual seq_* booleans (incl. the seq_cross_ice royal-road proxy) are exposed for
      downstream grouping. Strength + is_empty_net are derived from situation_code relative
      to the shooting team. Thresholds are dbt vars tuned in
      models_ml/tune_sequence_thresholds.py; see docs/methodology/sequence-mining.md.
      This is the feature backbone the in-house xG model (Phase 2.2) consumes.
    columns:
      - name: game_id
        tests: [not_null]
      - name: event_id
        tests: [not_null]
      - name: season
        tests: [not_null]
      - name: shooter_id
        description: Shooting player (shooting_player_id, or scoring_player_id for goals)
      - name: strength
        description: Strength relative to the shooting team (5v5, PP, SH, other)
        tests:
          - accepted_values:
              values: ['5v5', 'PP', 'SH', 'other']
      - name: seq_type
        description: Single precedence label for how the shot was generated
        tests:
          - not_null
          - accepted_values:
              values: ['rebound', 'rush', 'forecheck', 'cycle', 'point_shot', 'other']
      - name: is_goal
        tests: [not_null]
      - name: time_since_faceoff
        description: Seconds since the most recent faceoff, capped 60, null if none ≤60s
      - name: time_since_turnover
        description: Seconds since the most recent giveaway/takeaway, capped 60, null if none

  - name: int_rink_bias
    description: >
      Scorer-bias (rink) multipliers for hits/giveaways/takeaways per arena and season
      (blueprint 3.4), measured from visiting teams over a rolling 3-season window with a
      team-mix control, clipped to [0.5, 2.0]. adjusted = raw / multiplier. See
      docs/methodology/scorer-bias.md.
    columns:
      - name: season
        tests: [not_null]
      - name: arena_team_id
        tests: [not_null]
      - name: stat
        tests:
          - accepted_values:
              values: ['hits', 'giveaways', 'takeaways']
      - name: multiplier
        description: actual / expected rate in the arena (clipped 0.5..2.0)

  - name: int_score_state_weights
    description: >
      League-average 5v5 shot-attempt rate by score state per season, with
      weight = tied_rate / state_rate (blueprint 3.5). Used to score-adjust possession/xG
      shares. See docs/methodology/score-state-adjustment.md.
    columns:
      - name: season
        tests: [not_null]
      - name: state
        tests:
          - accepted_values:
              values: ['down2plus', 'down1', 'tied', 'up1', 'up2plus']
      - name: weight
        description: tied_rate / state_rate (1.0 at tied)

  - name: int_shot_score_adj
    description: >
      Per (game, team) score-state-weighted 5v5 Corsi/xG aggregates feeding
      cf_pct_score_adj / xgf_pct_score_adj on mart_team_game_stats (Phase 2.3).
    columns:
      - name: game_id
        tests: [not_null]
      - name: team_id
        tests: [not_null]

  - name: int_goalie_shots
    description: >
      Every unblocked shot faced by a goalie (on-goal + missed) with in-house xG and
      danger/strength labels (Phase 2.5). xGA sums over all unblocked shots (calibrated);
      saves use on-goal only. Empty-net shots excluded. See docs/methodology/goaltending.md.
    columns:
      - name: game_id
        tests: [not_null]
      - name: goalie_id
        tests: [not_null]
      - name: danger_tier
        tests:
          - accepted_values:
              values: ['low', 'medium', 'high', 'unknown']

  - name: int_line_seasons
    description: >
      Every forward trio (line_type 'F3') and defense pair ('D2') that shared at least
      var('line_min_5v5_minutes') of 5v5 ice in a single season, with its on-ice 5v5 results
      (xGF%, xGF/60, xGA/60) and for-shot seq-type mix. Training set for the Lineup Lab line-fit
      model (Phase 5.1, blueprint 6.2). A segment belongs to a line when exactly those skaters are
      the team's forwards (3) / defensemen (2) on the ice. Reg season + playoffs only; segments
      exist 2015-16+. See docs/methodology/lineup-lab.md.
    columns:
      - name: season
        tests: [not_null]
      - name: team_id
        tests: [not_null]
      - name: line_type
        tests:
          - accepted_values:
              values: ['F3', 'D2']
      - name: line_key
        description: Order-invariant '-'-joined sorted member player_ids (unique per line within a season)
        tests: [not_null]
      - name: minutes
        description: Shared 5v5 minutes (>= var('line_min_5v5_minutes'))
        tests: [not_null]
      - name: xgf_pct
        description: On-ice 5v5 xGF / (xGF + xGA) over the line's shared segments
        tests: [not_null]

  - name: int_draft_player_value
    description: >
      Realized career value per drafted pick (Handoff 5, Phase B). Universe = every pick in
      stg_draft_results; never-NHL = realized value 0 (not missing). realized_value (floored at
      replacement) is summed pWAR over the player's first var('draft_eval_window_years') post-draft
      seasons. is_evaluable = fully observable class (2010-2018 headline); is_censored = window past
      the latest season.
    columns:
      - name: pick_key
        description: Surrogate "draft_year-overall_pick" — one row per pick
        tests: [not_null, unique]
      - name: realized_value
        description: Floored (>=0) realized pWAR over the window; the curve/theory quantity
        tests: [not_null]
      - name: realized_pwar
        description: Signed realized pWAR over the window (can be negative)
        tests: [not_null]
      - name: made_nhl
        description: True when the pick resolved to a player in our production data
        tests: [not_null]

  - name: int_segment_5v5_results
    description: >
      Per-5v5-segment shot results from the home and away perspective: for/against xG (from
      nhl_models.shot_xg via int_on_ice_events, the same pull as models_ml/train_rapm.py),
      Corsi attempt counts, and goals. The shared even-strength segment fact behind
      int_player_onice_game, mart_player_toi_matrix, and mart_player_wowy. Regular season +
      playoffs only; event_owner_team_id is the attacking team for all four attempt types so
      the numbers reconcile with mart_team_game_stats.
    columns:
      - name: game_id
        tests: [not_null]
      - name: segment_index
        tests: [not_null]
      - name: segment_duration
        description: 5v5 segment length in seconds (> 0)
        tests: [not_null]
      - name: xgf_home
        description: Expected goals FOR the home team in the segment
        tests: [not_null]
      - name: xgf_away
        description: Expected goals FOR the away team in the segment
        tests: [not_null]

  - name: int_player_onice_game
    description: >
      Per (game_id, player_id) even-strength (5v5) on-ice / off-ice results oriented to the
      player's team. On-ice = segments the player is on; off-ice = the team's other 5v5
      segments in the game. rel_* = on minus off. Raw sums are exposed so mart_player_onice
      and mart_player_wowy re-aggregate without leakage. Skaters only.
    columns:
      - name: game_id
        tests: [not_null]
      - name: player_id
        tests: [not_null]
      - name: toi_5v5_sec
        description: On-ice 5v5 seconds for the player in the game
        tests: [not_null]
      - name: on_ice_xgf_pct
        description: On-ice 5v5 xGF / (xGF + xGA); null if no on-ice shot xG both ways
      - name: rel_xgf_pct
        description: on_ice_xgf_pct - off_ice_xgf_pct (the true relative)
