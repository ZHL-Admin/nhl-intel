name: 'nhl_intel'
version: '1.0.0'
config-version: 2

profile: 'nhl_intel'

# Centralized thresholds so SQL never hardcodes sequence-mining or danger constants.
# Sequence windows are TUNED, not guessed: models_ml/tune_sequence_thresholds.py sweeps
# each window over 2018-19..2024-25 and reports flagged-vs-unflagged goal-rate lift and
# season-share stability. Tuning table + rationale: docs/methodology/sequence-mining.md.
#   rush=4, forecheck=5 are the data-driven max-lift/most-stable picks.
#   rebound=3 retained over 2 (identical lift 2.44 vs 2.45) for coverage + convention.
vars:
  rush_window_seconds: 4
  rebound_window_seconds: 3
  forecheck_window_seconds: 5
  cross_ice_window_seconds: 2
  high_danger_x_min: 55
  high_danger_y_max: 22
  # Goaltending danger tiers by per-shot xG (Phase 2.5). Half-open [lo, hi):
  # low < 0.05, medium 0.05-0.15, high >= 0.15. Mirrors models_ml/config.DANGER_TIERS.
  danger_low_max: 0.05
  danger_high_min: 0.15
  # Opponent-adjustment rating source (Phase 3.1). Mirrors models_ml/config.RATING_SOURCE.
  # 'power_rating' => mart_team_game_stats xgf opponent adjustment uses the opponent's
  # pregame power-rating strength share (nhl_models.team_ratings); 'interim_xgf' => the
  # Phase 2.3 season-to-date xGF% fallback (used before team_ratings exists).
  rating_source: power_rating
  # Single-game "game score" weights (Phase 4.3), following the public game-score family
  # (Dom Luszczyszyn). Individual production dominates; blocks/hits are small; the on-ice term
  # nudges by even-strength xG share. mart_player_game_score consumes these.
  gs_goal: 0.75
  gs_primary_assist: 0.7
  gs_secondary_assist: 0.55
  gs_ixg: 0.75
  gs_shot: 0.075
  gs_block: 0.05
  gs_hit: 0.05
  gs_onice_xg: 1.0
  # Line-fit model (Phase 5.1): minimum shared 5v5 minutes for a forward trio / defense
  # pair to qualify as a line-season in int_line_seasons (the Lineup Lab training set).
  line_min_5v5_minutes: 30
  # Draft Value tool (Handoff 5). Mirror models_ml/config.DRAFT_VALUE so SQL never hardcodes.
  draft_eval_window_years: 7    # first N NHL-eligible post-draft seasons summed into realized value
  draft_eval_class_min: 2010    # classes fully observable under the window (headline universe)
  draft_eval_class_max: 2018
  draft_regular_gp: 200         # "became a regular" career-GP threshold (literature)
  # Phase Value (phase_value_v1): possession-state engine + episode segmentation. See
  # docs/methodology/phase-value.md. rush_window_seconds (above) is REUSED for the rush start_type;
  # these are the additional PV knobs. Values are owner-ruled defaults (Stage 5 sensitivity-tests
  # phase_episode_gap_seconds in {2,4,6}); SQL never hardcodes them.
  phase_episode_gap_seconds: 4      # max defender-touch gap merged inside one DZ episode
  phase_rush_state_seconds: 5       # OZ ticks count as P_OZ_RUSH for this long after a rush start
  phase_oz_faceoff_link_seconds: 2  # faceoff-to-start linkage window for the oz_faceoff start_type
  phase_tick_seconds: 5             # int_phase_ticks sample length (mirror PHASE_VALUE_CONFIG.TICK_SECONDS)
  blocked_shot_possession: 'opp'    # PV-D005 default (possession=opponent of blocking owner); §9.3 sens uses 'owner'
  # Dev-season scoping (no such mechanism pre-existed, PV-D004): set to a list of seasons to limit PV
  # dbt models during development, e.g. ['2023-24','2024-25']; empty list = full history.
  phase_dev_seasons: []

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"
  - "logs"

models:
  nhl_intel:
    raw:
      +materialized: view
      +schema: raw
    staging:
      +materialized: view
      +schema: staging
    intermediate:
      +materialized: view
      +schema: staging
    mart:
      +materialized: table
      +schema: mart

# System Effects (Phase 7) promoted descriptive tables. The fingerprints_v2, consolidated regime
# ledger, metric status, and schedule adjustment are frozen research values (re-derivation from
# production sources fails reconciliation — backbone divergence); seeded here as the source of
# record and refreshed on research re-run (regime consolidation is refreshed daily; see
# docs/rebuild-reports/syseff-p7.md).
seeds:
  nhl_intel:
    syseff:
      +schema: mart
      +quote_columns: false
