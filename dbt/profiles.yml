nhl_intel:
  target: prod
  outputs:
    prod:
      type: bigquery
      method: service-account
      project: "{{ env_var('GCP_PROJECT_ID') }}"
      dataset: "{{ env_var('GCP_DATASET_STAGING') }}"
      keyfile: /opt/airflow/secrets/nhl-intel-sa.json
      threads: 4
      timeout_seconds: 300
      location: US
      priority: interactive
